<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recherche - SUPCONTENT</title>
  <link rel="stylesheet" href="/noyau/styles.css" />
  <style>
    .search-layout{
      max-width: 980px;
      margin-inline: auto;
    }
    .search-layout .card{
      padding: 18px;
    }
    .music-search-shell{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      background:#f8fbff;
      color:#0b1220;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.22);
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .music-search-shell .search-ico{
      font-size:24px;
      line-height:1;
      opacity:.88;
    }
    .music-search-input{
      flex:1;
      border:0;
      outline:0;
      background:transparent;
      font-size:clamp(16px,2.6vw,30px);
      font-weight:800;
      color:#0b1220;
      min-width:0;
    }
    .search-clear-btn{
      border:0;
      background:transparent;
      font-size:34px;
      line-height:1;
      color:#182235;
      cursor:pointer;
      padding:0 4px;
    }
    .source-switch{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
      justify-content:flex-start;
    }
    .source-btn{
      border:1px solid var(--border);
      background:#050a1b;
      color:#d9def0;
      border-radius:999px;
      padding:10px 16px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }
    .source-btn.is-active{
      background:#22e062;
      border-color:#22e062;
      color:#02120a;
      box-shadow:0 0 0 4px rgba(34,224,98,.18);
    }
    .source-btn[data-source="youtube"].is-active{
      background:#ff2f2f;
      border-color:#ff2f2f;
      color:#fff;
      box-shadow:0 0 0 4px rgba(255,47,47,.2);
    }
    .type-switch{
      display:flex;
      gap:8px;
      margin-top:12px;
      flex-wrap:wrap;
      justify-content:flex-start;
    }
    .type-btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:#dfe6ff;
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      cursor:pointer;
    }
    .type-btn.is-active{ border-color:#7c5cff; color:#fff; }

    .import-shell{
      border:1px solid var(--border);
      border-radius:18px;
      background:#060c1e;
      padding:14px;
      max-width: 860px;
      margin: 0 auto;
    }
    .import-title{
      margin:4px 0 0 0;
      font-size:clamp(20px,2.8vw,40px);
      font-weight:900;
      text-align:center;
      line-height:1.05;
    }
    .import-source-switch{
      margin-top:12px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .import-platform-btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:#eaf0ff;
      border-radius:999px;
      padding:10px 16px;
      font-weight:800;
      cursor:pointer;
    }
    .import-platform-btn.is-active[data-import-platform="youtube"]{
      background:#ff2020;
      border-color:#ff2020;
      color:#fff;
    }
    .import-platform-btn.is-active[data-import-platform="spotify"]{
      background:#1ed760;
      border-color:#1ed760;
      color:#032312;
    }
    .import-logo{
      margin:18px auto 12px auto;
      width:min(30vw,170px);
      height:min(30vw,170px);
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:clamp(36px,6vw,60px);
      font-weight:900;
      color:#fff;
      box-shadow:0 16px 36px rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(circle at 16% 10%, rgba(255,0,0,.6), rgba(14,16,36,.96));
    }
    .import-logo.spotify{
      background:radial-gradient(circle at 16% 10%, rgba(30,215,96,.72), rgba(11,22,19,.96));
    }
    .import-subtitle{
      margin:0 0 12px 0;
      text-align:center;
      font-size:clamp(16px,2.2vw,22px);
      font-weight:800;
      color:#dfe6ff;
    }

    .import-link{
      margin-top:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }
    .link-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .link-input{
      flex:1;
      min-width:220px;
      border-radius:14px;
      border:1px solid var(--border);
      padding:12px 14px;
      background:#0a1022;
      color:#fff;
      font-size:16px;
    }
    .load-btn{
      border:0;
      border-radius:14px;
      padding:12px 20px;
      font-weight:900;
      background:#ff2020;
      color:#fff;
      cursor:pointer;
      width:100%;
      margin-top:10px;
    }
    .load-btn.spotify{
      background:#1ed760;
      color:#032312;
    }
    .imported-list{
      display:grid;
      gap:10px;
      margin-top:12px;
    }
    .music-panels{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:14px;
      align-items:start;
    }
    .music-panel{
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(10,16,35,.82);
      padding:14px;
    }
    .music-panel h2{
      margin:0 0 10px 0;
      font-size:clamp(22px,2.5vw,38px);
    }
    .playlist-line{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px;
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:8px;
      background:rgba(255,255,255,.03);
    }
    .playlist-line .meta{ min-width:0; }
    .playlist-line .meta strong{
      display:block;
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      word-break:break-word;
      line-height:1.25;
    }
    .playlist-line .sub{
      color:var(--muted);
      font-size:12px;
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      word-break:break-word;
      line-height:1.35;
    }
    .playlist-line .actions{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      justify-content:flex-start;
    }
    .playlist-line .actions .btn{
      padding:8px 10px;
      font-size:14px;
    }
    .feature-actions{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      align-items:stretch;
      margin-top:12px;
    }
    .feature-actions .btn{
      min-width:0;
      width:100%;
    }
    #results.results{
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    }
    @media (max-width: 980px){
      .search-layout .card{
        padding: 14px;
      }
      .music-search-shell{
        padding: 12px 14px;
        border-radius: 22px;
      }
      .music-search-shell .search-ico{
        font-size: 28px;
      }
      .search-clear-btn{
        font-size: 34px;
      }
      .import-shell{
        padding: 12px;
      }
      .music-panels{
        grid-template-columns:1fr;
      }
      .playlist-line{
        grid-template-columns: 1fr;
      }
      .playlist-line .actions{
        justify-content:flex-start;
      }
    }
    @media (max-width: 640px){
      .feature-actions .btn{
        grid-column:span 2;
      }
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="nav-inner">
      <div class="brand"><span class="dot"></span> SUPCONTENT Music</div>
      <div class="menu">
        <a class="pill" href="/utilisateurs/utilisateurs.html">Recherche utilisateurs</a>
        <a class="pill" href="/connexion/connexion.html">Connexion</a>
      </div>
    </div>
  </div>

  <div class="container search-layout">
    <div class="grid">
      <div class="card span12">
        <form id="searchBarForm" class="music-search-shell">
          <span class="search-ico">⌕</span>
          <input id="musicSearchInput" class="music-search-input" name="q" placeholder="Que voulez-vous écouter ?" autocomplete="off" />
          <button id="clearSearchBtn" class="search-clear-btn" type="button" aria-label="Vider">×</button>
        </form>
        <div class="source-switch">
          <button id="srcSpotifyBtn" class="source-btn is-active" type="button" data-source="spotify">Spotify</button>
          <button id="srcYouTubeBtn" class="source-btn" type="button" data-source="youtube">YouTube</button>
        </div>
        <div class="type-switch">
          <button class="type-btn is-active" type="button" data-type="track">Titres</button>
          <button class="type-btn" type="button" data-type="artist">Artistes</button>
          <button class="type-btn" type="button" data-type="album">Albums</button>
        </div>
      </div>
      <div class="card span12">
        <div class="music-panels">
          <section class="music-panel">
            <h2>Importer une liste de lecture</h2>
            <div class="import-shell">
              <h3 id="importTitle" class="import-title">Importer depuis YouTube</h3>
              <div class="import-source-switch">
                <button class="import-platform-btn is-active" type="button" data-import-platform="youtube">YouTube</button>
                <button class="import-platform-btn" type="button" data-import-platform="spotify">Spotify</button>
              </div>
              <div id="importLogo" class="import-logo">▶</div>
              <p id="importSubtitle" class="import-subtitle">Collez le lien de la playlist YouTube</p>
              <div class="import-link">
                <div class="link-row">
                  <input id="playlistUrlInput" class="link-input" placeholder="https://open.spotify.com/playlist/... ou https://music.youtube.com/playlist?list=..." />
                </div>
                <button id="loadPlaylistBtn" class="load-btn" type="button">Charger la playlist</button>
              </div>
            </div>
          </section>
          <section class="music-panel">
            <h2>Playlists importées</h2>
            <div id="importedPlaylists" class="imported-list"><small>Aucune playlist importée.</small></div>
            <div class="feature-actions">
              <button id="mergePlaylistsBtn" class="btn" type="button">Fusionner playlists</button>
              <button id="playImportedBtn" class="btn primary" type="button">Lire les musiques</button>
              <button id="syncPlatformsBtn" class="btn" type="button">Synchroniser plateformes</button>
              <button id="favoritesOnlyBtn" class="btn" type="button">Favoris uniquement</button>
            </div>
          </section>
        </div>
      </div>
      <div class="card span12">
        <h2>Résultats musique</h2>
        <div id="results" class="results"></div>
        <small id="hint"></small>
      </div>

    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="/recherche/recherche.js"></script>
  <script type="module" src="/noyau/footer.js"></script>
</body>
</html>
